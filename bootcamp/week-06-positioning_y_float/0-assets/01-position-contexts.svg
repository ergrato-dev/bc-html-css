<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" width="820" height="460" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="820" height="460" fill="#0d1117"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" fill="#f0f6fc" font-size="16" font-weight="700">CSS Position — Contextos de Posicionamiento</text>

  <!-- ================================================================
       Column 1: static / relative
  ================================================================ -->
  <text x="130" y="68" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">FLUJO NORMAL</text>

  <!-- static box -->
  <rect x="30" y="78" width="200" height="60" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="130" y="100" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">position: static</text>
  <text x="130" y="118" text-anchor="middle" fill="#8b949e" font-size="10">En el flujo normal</text>
  <text x="130" y="130" text-anchor="middle" fill="#8b949e" font-size="10">top/left/right/bottom ignorados</text>

  <!-- relative box -->
  <rect x="30" y="152" width="200" height="60" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="130" y="174" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="700">position: relative</text>
  <text x="130" y="192" text-anchor="middle" fill="#8b949e" font-size="10">Flujo preservado</text>
  <text x="130" y="204" text-anchor="middle" fill="#8b949e" font-size="10">Desplazado desde su origen</text>

  <!-- relative ghost -->
  <rect x="30" y="226" width="200" height="36" rx="4" fill="none" stroke="#58a6ff" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="130" y="249" text-anchor="middle" fill="#58a6ff" font-size="10">Espacio original reservado</text>

  <!-- ================================================================
       Column 2: absolute
  ================================================================ -->
  <text x="410" y="68" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">CONTAINING BLOCK</text>

  <!-- containing block parent -->
  <rect x="300" y="78" width="220" height="180" rx="6" fill="#161b22" stroke="#e34f26" stroke-width="2"/>
  <text x="340" y="100" fill="#e34f26" font-size="11" font-weight="700">position: relative</text>
  <text x="340" y="116" fill="#8b949e" font-size="10">Containing block</text>

  <!-- flow element inside -->
  <rect x="315" y="128" width="140" height="32" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="385" y="148" text-anchor="middle" fill="#c9d1d9" font-size="10">Elemento en flujo</text>

  <!-- absolute child -->
  <rect x="390" y="162" width="120" height="40" rx="4" fill="#264de4" opacity="0.9"/>
  <text x="450" y="178" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">position: absolute</text>
  <text x="450" y="192" text-anchor="middle" fill="#c9d1d9" font-size="9">top:8px · right:8px</text>

  <!-- connecting arrow: top-right corner -->
  <line x1="510" y1="86" x2="510" y2="162" stroke="#e34f26" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="510,162 506,154 514,154" fill="#e34f26"/>

  <!-- Label: Fuera del flujo -->
  <text x="410" y="284" text-anchor="middle" fill="#e34f26" font-size="11">Fuera del flujo — vecinos lo ignoran</text>

  <!-- ================================================================
       Column 3: fixed / sticky
  ================================================================ -->
  <text x="680" y="68" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="600">VIEWPORT / SCROLL</text>

  <!-- viewport frame -->
  <rect x="590" y="78" width="180" height="200" rx="6" fill="#161b22" stroke="#f0e68c" stroke-width="1.5"/>
  <text x="680" y="98" text-anchor="middle" fill="#f0e68c" font-size="10" font-weight="600">Viewport</text>
  <line x1="590" y1="106" x2="770" y2="106" stroke="#30363d" stroke-width="1"/>

  <!-- fixed header inside viewport -->
  <rect x="597" y="110" width="166" height="28" rx="4" fill="#264de4"/>
  <text x="680" y="129" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">position: fixed</text>

  <!-- sticky element -->
  <rect x="597" y="168" width="166" height="28" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="680" y="182" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="700">position: sticky</text>
  <text x="680" y="195" text-anchor="middle" fill="#8b949e" font-size="9">top: 0</text>

  <!-- scroll indicator -->
  <line x1="775" y1="110" x2="775" y2="278" stroke="#30363d" stroke-width="2"/>
  <rect x="770" y="150" width="10" height="40" rx="5" fill="#3fb950" opacity="0.7"/>
  <text x="795" y="178" fill="#8b949e" font-size="9" text-anchor="middle">scroll</text>

  <!-- fixed note -->
  <text x="680" y="295" text-anchor="middle" fill="#264de4" font-size="10">fixed → siempre en el mismo lugar</text>
  <text x="680" y="310" text-anchor="middle" fill="#3fb950" font-size="10">sticky → hasta límite del contenedor</text>

  <!-- ================================================================
       Summary table
  ================================================================ -->
  <rect x="30" y="320" width="760" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="410" y="342" text-anchor="middle" fill="#f0f6fc" font-size="13" font-weight="700">Resumen de valores de position</text>

  <!-- Table headers -->
  <text x="110" y="364" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">Valor</text>
  <text x="260" y="364" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">Flujo normal</text>
  <text x="450" y="364" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">Containing block</text>
  <text x="660" y="364" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">Mueve con scroll</text>
  <line x1="40" y1="370" x2="780" y2="370" stroke="#30363d" stroke-width="1"/>

  <!-- Rows -->
  <text x="110" y="386" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="600">static</text>
  <text x="260" y="386" text-anchor="middle" fill="#c9d1d9" font-size="10">✅ Sí</text>
  <text x="450" y="386" text-anchor="middle" fill="#c9d1d9" font-size="10">N/A</text>
  <text x="660" y="386" text-anchor="middle" fill="#c9d1d9" font-size="10">✅ Sí</text>

  <text x="110" y="402" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="600">relative</text>
  <text x="260" y="402" text-anchor="middle" fill="#c9d1d9" font-size="10">✅ Sí (preservado)</text>
  <text x="450" y="402" text-anchor="middle" fill="#c9d1d9" font-size="10">N/A</text>
  <text x="660" y="402" text-anchor="middle" fill="#c9d1d9" font-size="10">✅ Sí</text>

  <text x="110" y="418" text-anchor="middle" fill="#e34f26" font-size="10" font-weight="600">absolute</text>
  <text x="260" y="418" text-anchor="middle" fill="#c9d1d9" font-size="10">❌ No</text>
  <text x="450" y="418" text-anchor="middle" fill="#c9d1d9" font-size="10">Ancestro posicionado</text>
  <text x="660" y="418" text-anchor="middle" fill="#c9d1d9" font-size="10">✅ Sí</text>

  <text x="110" y="434" text-anchor="middle" fill="#264de4" font-size="10" font-weight="600">fixed</text>
  <text x="260" y="434" text-anchor="middle" fill="#c9d1d9" font-size="10">❌ No</text>
  <text x="450" y="434" text-anchor="middle" fill="#c9d1d9" font-size="10">Viewport</text>
  <text x="660" y="434" text-anchor="middle" fill="#c9d1d9" font-size="10">❌ No</text>

  <text x="110" y="450" text-anchor="middle" fill="#f0e68c" font-size="10" font-weight="600">sticky</text>
  <text x="260" y="450" text-anchor="middle" fill="#c9d1d9" font-size="10">✅ Parcial</text>
  <text x="450" y="450" text-anchor="middle" fill="#c9d1d9" font-size="10">Contenedor padre</text>
  <text x="660" y="450" text-anchor="middle" fill="#c9d1d9" font-size="10">✅ Hasta umbral</text>
</svg>
