<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ejercicio 03 — Galería Multimedia</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }

    h2 {
      color: #e34f26;
      border-bottom: 1px solid #30363d;
      padding-bottom: 0.5rem;
      margin-top: 2.5rem;
    }

    figure {
      margin: 1.5rem 0;
      background: #161b22;
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid #30363d;
    }

    figure img,
    figure video,
    figure iframe {
      display: block;
      border-radius: 4px;
      max-width: 100%;
      height: auto;
    }

    figcaption {
      font-size: 0.88rem;
      color: #8b949e;
      margin-top: 0.5rem;
      font-style: italic;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
  </style>
</head>

<body>
