<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420">
  <rect width="820" height="420" fill="#0d1117"/>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#f0f6fc">Modelo de Color HSL y Paletas con CSS Custom Properties</text>

  <!-- ── HSL wheel description ── -->
  <text x="30" y="62" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#cdd9e5">Hue (H) — 0° a 360°</text>

  <!-- Hue bar -->
  <defs>
    <linearGradient id="hue-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="hsl(0,80%,55%)"/>
      <stop offset="16%"  stop-color="hsl(60,80%,55%)"/>
      <stop offset="33%"  stop-color="hsl(120,80%,55%)"/>
      <stop offset="50%"  stop-color="hsl(180,80%,55%)"/>
      <stop offset="66%"  stop-color="hsl(240,80%,55%)"/>
      <stop offset="83%"  stop-color="hsl(300,80%,55%)"/>
      <stop offset="100%" stop-color="hsl(360,80%,55%)"/>
    </linearGradient>
  </defs>
  <rect x="30" y="70" width="370" height="22" rx="4" fill="url(#hue-grad)"/>
  <text x="30"  y="108" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">0° Rojo</text>
  <text x="107" y="108" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">60° Amarillo</text>
  <text x="195" y="108" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">120° Verde</text>
  <text x="270" y="108" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">180° Cian</text>
  <text x="330" y="108" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">240° Azul</text>

  <!-- Saturation bar -->
  <text x="30" y="130" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#cdd9e5">Saturation (S) — 0% a 100%</text>
  <defs>
    <linearGradient id="sat-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="hsl(225,0%,52%)"/>
      <stop offset="100%" stop-color="hsl(225,100%,52%)"/>
    </linearGradient>
  </defs>
  <rect x="30" y="138" width="370" height="22" rx="4" fill="url(#sat-grad)"/>
  <text x="30"  y="176" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">0% Gris</text>
  <text x="345" y="176" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">100% Puro</text>

  <!-- Lightness bar -->
  <text x="30" y="196" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#cdd9e5">Lightness (L) — 0% a 100%</text>
  <defs>
    <linearGradient id="light-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="hsl(225,73%,0%)"/>
      <stop offset="50%"  stop-color="hsl(225,73%,52%)"/>
      <stop offset="100%" stop-color="hsl(225,73%,100%)"/>
    </linearGradient>
  </defs>
  <rect x="30" y="204" width="370" height="22" rx="4" fill="url(#light-grad)"/>
  <text x="30"  y="242" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">0% Negro</text>
  <text x="170" y="242" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">50% Normal</text>
  <text x="343" y="242" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">100% Blanco</text>

  <!-- HSL formula -->
  <rect x="30" y="252" width="370" height="28" rx="6" fill="#1f304d"/>
  <text x="40" y="271" font-family="'Fira Code', monospace" font-size="13" fill="#79c0ff">color: hsl(</text>
  <text x="151" y="271" font-family="'Fira Code', monospace" font-size="13" fill="#e34f26">225</text>
  <text x="178" y="271" font-family="'Fira Code', monospace" font-size="13" fill="#f0f6fc">,</text>
  <text x="188" y="271" font-family="'Fira Code', monospace" font-size="13" fill="#3fb950">73%</text>
  <text x="222" y="271" font-family="'Fira Code', monospace" font-size="13" fill="#f0f6fc">,</text>
  <text x="232" y="271" font-family="'Fira Code', monospace" font-size="13" fill="#d2a8ff">52%</text>
  <text x="263" y="271" font-family="'Fira Code', monospace" font-size="13" fill="#79c0ff">);</text>

  <!-- ── Palette panel ── -->
  <text x="440" y="62" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#cdd9e5">Paleta con mismo Hue (225°)</text>

  <!-- Brand palette swatches (hsl 225, varying lightness) -->
  <rect x="440" y="70" width="58" height="38" rx="4" fill="hsl(225,73%,15%)"/>
  <text x="469" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#f0f6fc">900</text>

  <rect x="502" y="70" width="58" height="38" rx="4" fill="hsl(225,73%,25%)"/>
  <text x="531" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#f0f6fc">700</text>

  <rect x="564" y="70" width="58" height="38" rx="4" fill="hsl(225,73%,52%)"/>
  <text x="593" y="87" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#fff" font-weight="700">500★</text>
  <text x="593" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="rgba(255,255,255,0.7)">base</text>

  <rect x="626" y="70" width="58" height="38" rx="4" fill="hsl(225,73%,72%)"/>
  <text x="655" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#0d1117">300</text>

  <rect x="688" y="70" width="58" height="38" rx="4" fill="hsl(225,73%,90%)"/>
  <text x="717" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#0d1117">100</text>
  <rect x="688" y="70" width="58" height="38" rx="4" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- CSS for palette -->
  <rect x="440" y="118" width="350" height="108" rx="6" fill="#161b22"/>
  <text x="452" y="137" font-family="'Fira Code', monospace" font-size="10.5" fill="#8b949e">:root {</text>
  <text x="452" y="153" font-family="'Fira Code', monospace" font-size="10.5" fill="#79c0ff">  --hue-brand: </text>
  <text x="580" y="153" font-family="'Fira Code', monospace" font-size="10.5" fill="#e34f26">225</text>
  <text x="596" y="153" font-family="'Fira Code', monospace" font-size="10.5" fill="#8b949e">;</text>
  <text x="452" y="169" font-family="'Fira Code', monospace" font-size="10.5" fill="#79c0ff">  --blue-900: </text>
  <text x="560" y="169" font-family="'Fira Code', monospace" font-size="10.5" fill="#3fb950">hsl(var(--hue-brand) 73% 15%)</text>
  <text x="730" y="169" font-family="'Fira Code', monospace" font-size="10.5" fill="#8b949e">;</text>
  <text x="452" y="185" font-family="'Fira Code', monospace" font-size="10.5" fill="#79c0ff">  --blue-500: </text>
  <text x="560" y="185" font-family="'Fira Code', monospace" font-size="10.5" fill="#3fb950">hsl(var(--hue-brand) 73% 52%)</text>
  <text x="730" y="185" font-family="'Fira Code', monospace" font-size="10.5" fill="#8b949e">;</text>
  <text x="452" y="201" font-family="'Fira Code', monospace" font-size="10.5" fill="#79c0ff">  --blue-100: </text>
  <text x="560" y="201" font-family="'Fira Code', monospace" font-size="10.5" fill="#3fb950">hsl(var(--hue-brand) 73% 90%)</text>
  <text x="730" y="201" font-family="'Fira Code', monospace" font-size="10.5" fill="#8b949e">;</text>
  <text x="452" y="217" font-family="'Fira Code', monospace" font-size="10.5" fill="#8b949e">}</text>

  <!-- Benefit label -->
  <rect x="440" y="234" width="350" height="28" rx="6" fill="#0f2e1a"/>
  <text x="615" y="252" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#3fb950">✓ Cambiar --hue-brand actualiza toda la paleta</text>

  <!-- ── Semantic tokens panel ── -->
  <text x="30" y="302" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#cdd9e5">Design Tokens Semánticos</text>
  <rect x="30" y="310" width="760" height="24" rx="4" fill="#161b22"/>
  <text x="40"  y="327" font-family="'Fira Code', monospace" font-size="10.5" fill="#79c0ff">--color-primary:</text>
  <text x="168" y="327" font-family="'Fira Code', monospace" font-size="10.5" fill="#3fb950">var(--blue-500)</text>
  <text x="48"  y="327" font-family="'Fira Code', monospace" font-size="10.5" fill="none"/>

  <text x="340" y="327" font-family="'Fira Code', monospace" font-size="10.5" fill="#79c0ff">--color-text:</text>
  <text x="440" y="327" font-family="'Fira Code', monospace" font-size="10.5" fill="#3fb950">hsl(215 25% 10%)</text>

  <text x="590" y="327" font-family="'Fira Code', monospace" font-size="10.5" fill="#79c0ff">--color-bg:</text>
  <text x="673" y="327" font-family="'Fira Code', monospace" font-size="10.5" fill="#3fb950">hsl(0 0% 100%)</text>

  <!-- Dark mode override -->
  <rect x="30" y="340" width="760" height="52" rx="6" fill="#1a1a2e"/>
  <text x="40" y="358" font-family="'Fira Code', monospace" font-size="10.5" fill="#d2a8ff">@media (prefers-color-scheme: dark) {</text>
  <text x="40" y="374" font-family="'Fira Code', monospace" font-size="10.5" fill="#8b949e">  :root { </text>
  <text x="110" y="374" font-family="'Fira Code', monospace" font-size="10.5" fill="#79c0ff">--color-bg: </text>
  <text x="200" y="374" font-family="'Fira Code', monospace" font-size="10.5" fill="#3fb950">hsl(215 28% 8%)</text>
  <text x="320" y="374" font-family="'Fira Code', monospace" font-size="10.5" fill="#8b949e">; </text>
  <text x="337" y="374" font-family="'Fira Code', monospace" font-size="10.5" fill="#79c0ff">--color-text: </text>
  <text x="440" y="374" font-family="'Fira Code', monacco" font-size="10.5" fill="#3fb950">hsl(215 20% 95%)</text>
  <text x="570" y="374" font-family="'Fira Code', monospace" font-size="10.5" fill="#8b949e">; } }</text>
  <text x="40" y="385" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e" font-style="italic">↑ Todo el sitio cambia automáticamente al redefinir las variables en dark mode</text>

  <!-- Footer note -->
  <text x="410" y="410" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">HSL facilita crear paletas coherentes — cambiando solo L obtienes variantes oscuras y claras del mismo color</text>
</svg>
