<svg viewBox="0 0 820 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="820" height="460" fill="#0d1117"/>
  <text x="410" y="34" font-size="16" fill="#e6edf3" text-anchor="middle" font-weight="bold">Tipos de &lt;input&gt; en HTML5</text>

  <!-- Row 1 -->
  <g transform="translate(20,55)">
    <rect width="175" height="72" rx="6" fill="#161b22" stroke="#264de4"/>
    <text x="88" y="20" font-size="10" fill="#58a6ff" text-anchor="middle" font-family="monospace">type="text"</text>
    <rect x="10" y="28" width="155" height="28" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="18" y="47" font-size="11" fill="#8b949e">Ana García</text>
    <text x="88" y="66" font-size="10" fill="#6e7681" text-anchor="middle">Texto libre</text>
  </g>

  <g transform="translate(210,55)">
    <rect width="175" height="72" rx="6" fill="#161b22" stroke="#264de4"/>
    <text x="88" y="20" font-size="10" fill="#58a6ff" text-anchor="middle" font-family="monospace">type="email"</text>
    <rect x="10" y="28" width="155" height="28" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="18" y="47" font-size="11" fill="#8b949e">ana@correo.com</text>
    <text x="88" y="66" font-size="10" fill="#6e7681" text-anchor="middle">Formato correo</text>
  </g>

  <g transform="translate(400,55)">
    <rect width="175" height="72" rx="6" fill="#161b22" stroke="#264de4"/>
    <text x="88" y="20" font-size="10" fill="#58a6ff" text-anchor="middle" font-family="monospace">type="password"</text>
    <rect x="10" y="28" width="155" height="28" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="18" y="47" font-size="11" fill="#8b949e">●●●●●●●●</text>
    <text x="88" y="66" font-size="10" fill="#6e7681" text-anchor="middle">Texto oculto</text>
  </g>

  <g transform="translate(590,55)">
    <rect width="210" height="72" rx="6" fill="#161b22" stroke="#264de4"/>
    <text x="105" y="20" font-size="10" fill="#58a6ff" text-anchor="middle" font-family="monospace">type="tel"</text>
    <rect x="10" y="28" width="190" height="28" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="18" y="47" font-size="11" fill="#8b949e">+52 123 456 7890</text>
    <text x="105" y="66" font-size="10" fill="#6e7681" text-anchor="middle">Teléfono</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(20,148)">
    <rect width="175" height="72" rx="6" fill="#161b22" stroke="#3fb950"/>
    <text x="88" y="20" font-size="10" fill="#3fb950" text-anchor="middle" font-family="monospace">type="number"</text>
    <rect x="10" y="28" width="155" height="28" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="18" y="47" font-size="11" fill="#8b949e">25   ▲▼</text>
    <text x="88" y="66" font-size="10" fill="#6e7681" text-anchor="middle">Numérico con spin</text>
  </g>

  <g transform="translate(210,148)">
    <rect width="175" height="72" rx="6" fill="#161b22" stroke="#3fb950"/>
    <text x="88" y="20" font-size="10" fill="#3fb950" text-anchor="middle" font-family="monospace">type="date"</text>
    <rect x="10" y="28" width="155" height="28" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="18" y="47" font-size="11" fill="#8b949e">2026-03-15 📅</text>
    <text x="88" y="66" font-size="10" fill="#6e7681" text-anchor="middle">Selector de fecha</text>
  </g>

  <g transform="translate(400,148)">
    <rect width="175" height="72" rx="6" fill="#161b22" stroke="#3fb950"/>
    <text x="88" y="20" font-size="10" fill="#3fb950" text-anchor="middle" font-family="monospace">type="range"</text>
    <rect x="15" y="38" width="145" height="6" rx="3" fill="#30363d"/>
    <circle cx="88" cy="41" r="9" fill="#3fb950"/>
    <text x="88" y="66" font-size="10" fill="#6e7681" text-anchor="middle">Selector de rango</text>
  </g>

  <g transform="translate(590,148)">
    <rect width="210" height="72" rx="6" fill="#161b22" stroke="#3fb950"/>
    <text x="105" y="20" font-size="10" fill="#3fb950" text-anchor="middle" font-family="monospace">type="color"</text>
    <rect x="60" y="28" width="90" height="28" rx="4" fill="#e34f26" stroke="#30363d"/>
    <text x="105" y="66" font-size="10" fill="#6e7681" text-anchor="middle">Selector de color</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(20,241)">
    <rect width="175" height="72" rx="6" fill="#161b22" stroke="#ff7b6b"/>
    <text x="88" y="20" font-size="10" fill="#ff7b6b" text-anchor="middle" font-family="monospace">type="checkbox"</text>
    <text x="30" y="50" font-size="18" fill="#3fb950">☑</text>
    <text x="50" y="50" font-size="12" fill="#e6edf3"> HTML</text>
    <text x="30" y="70" font-size="12" fill="#8b949e">☐ CSS (no marcado)</text>
    <text x="88" y="68" font-size="10" fill="none" text-anchor="middle">.</text>
  </g>

  <g transform="translate(210,241)">
    <rect width="175" height="72" rx="6" fill="#161b22" stroke="#ff7b6b"/>
    <text x="88" y="20" font-size="10" fill="#ff7b6b" text-anchor="middle" font-family="monospace">type="radio"</text>
    <text x="28" y="48" font-size="12" fill="#3fb950">⦿</text>
    <text x="46" y="48" font-size="12" fill="#e6edf3"> Sí</text>
    <text x="28" y="66" font-size="12" fill="#8b949e">○ No</text>
  </g>

  <g transform="translate(400,241)">
    <rect width="175" height="72" rx="6" fill="#161b22" stroke="#ff7b6b"/>
    <text x="88" y="20" font-size="10" fill="#ff7b6b" text-anchor="middle" font-family="monospace">type="file"</text>
    <rect x="10" y="28" width="155" height="28" rx="4" fill="#21262d" stroke="#30363d"/>
    <text x="88" y="47" font-size="11" fill="#58a6ff" text-anchor="middle">Elegir archivo...</text>
    <text x="88" y="66" font-size="10" fill="#6e7681" text-anchor="middle">Subir archivo</text>
  </g>

  <g transform="translate(590,241)">
    <rect width="210" height="72" rx="6" fill="#161b22" stroke="#ff7b6b"/>
    <text x="105" y="20" font-size="10" fill="#ff7b6b" text-anchor="middle" font-family="monospace">type="search"</text>
    <rect x="10" y="28" width="190" height="28" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="22" y="47" font-size="14" fill="#8b949e">🔍</text>
    <text x="42" y="47" font-size="11" fill="#8b949e">Buscar...</text>
    <text x="105" y="66" font-size="10" fill="#6e7681" text-anchor="middle">Campo de búsqueda</text>
  </g>

  <!-- Row 4: Select, Textarea, Button -->
  <g transform="translate(20,334)">
    <rect width="240" height="80" rx="6" fill="#161b22" stroke="#e34f26"/>
    <text x="120" y="20" font-size="10" fill="#e34f26" text-anchor="middle" font-family="monospace">&lt;select&gt;</text>
    <rect x="10" y="28" width="220" height="28" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="20" y="47" font-size="11" fill="#8b949e">México</text>
    <text x="215" y="47" font-size="11" fill="#8b949e">▼</text>
    <text x="120" y="74" font-size="10" fill="#6e7681" text-anchor="middle">Lista desplegable</text>
  </g>

  <g transform="translate(280,334)">
    <rect width="260" height="80" rx="6" fill="#161b22" stroke="#e34f26"/>
    <text x="130" y="20" font-size="10" fill="#e34f26" text-anchor="middle" font-family="monospace">&lt;textarea&gt;</text>
    <rect x="10" y="28" width="240" height="36" rx="4" fill="#0d1117" stroke="#30363d"/>
    <text x="20" y="48" font-size="11" fill="#8b949e">Escribe aquí tu mensaje</text>
    <text x="236" y="61" font-size="10" fill="#30363d">⌟</text>
    <text x="130" y="74" font-size="10" fill="#6e7681" text-anchor="middle">Texto multilinea</text>
  </g>

  <g transform="translate(560,334)">
    <rect width="240" height="80" rx="6" fill="#161b22" stroke="#e34f26"/>
    <text x="120" y="20" font-size="10" fill="#e34f26" text-anchor="middle" font-family="monospace">&lt;button&gt;</text>
    <rect x="30" y="28" width="180" height="34" rx="6" fill="#e34f26"/>
    <text x="120" y="50" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Enviar</text>
    <text x="120" y="74" font-size="10" fill="#6e7681" text-anchor="middle">type: submit | reset | button</text>
  </g>
</svg>
