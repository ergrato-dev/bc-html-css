<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" width="820" height="400" font-family="Inter, system-ui, sans-serif">
  <rect width="820" height="400" fill="#0d1117"/>

  <!-- Title -->
  <text x="410" y="30" fill="#f0f6fc" font-size="15" font-weight="700" text-anchor="middle">Estrategia Mobile-first — Breakpoints</text>

  <!-- ── MOBILE BASE ── -->
  <rect x="30" y="55" width="120" height="300" rx="8" fill="#161b22" stroke="#264de4" stroke-width="2"/>
  <!-- screen bezel -->
  <rect x="45" y="70" width="90" height="155" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <!-- home button -->
  <circle cx="90" cy="340" r="8" fill="#30363d"/>
  <!-- layout: 1 col -->
  <rect x="52" y="78" width="76" height="18" rx="2" fill="#264de4"/>
  <rect x="52" y="102" width="76" height="30" rx="2" fill="#21262d"/>
  <rect x="52" y="137" width="76" height="30" rx="2" fill="#21262d"/>
  <rect x="52" y="172" width="76" height="30" rx="2" fill="#21262d"/>
  <!-- label -->
  <text x="90" y="252" fill="#8b949e" font-size="10" font-weight="600" text-anchor="middle">320–479px</text>
  <text x="90" y="266" fill="#264de4" font-size="11" font-weight="700" text-anchor="middle">mobile base</text>
  <text x="90" y="282" fill="#8b949e" font-size="9" text-anchor="middle">1 columna</text>
  <text x="90" y="294" fill="#8b949e" font-size="9" text-anchor="middle">sin @media</text>

  <!-- ── TABLET SM ── -->
  <rect x="185" y="55" width="160" height="300" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <rect x="200" y="70" width="130" height="155" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <circle cx="265" cy="340" r="8" fill="#30363d"/>
  <!-- layout: 2 col -->
  <rect x="207" y="78" width="116" height="18" rx="2" fill="#264de4"/>
  <rect x="207" y="102" width="55" height="55" rx="2" fill="#21262d"/>
  <rect x="268" y="102" width="55" height="55" rx="2" fill="#21262d"/>
  <rect x="207" y="162" width="55" height="35" rx="2" fill="#21262d"/>
  <rect x="268" y="162" width="55" height="35" rx="2" fill="#21262d"/>
  <!-- label -->
  <text x="265" y="252" fill="#8b949e" font-size="10" font-weight="600" text-anchor="middle">480px+</text>
  <text x="265" y="266" fill="#3fb950" font-size="11" font-weight="700" text-anchor="middle">@media min-width: 480px</text>
  <text x="265" y="282" fill="#8b949e" font-size="9" text-anchor="middle">2 columnas</text>

  <!-- ── TABLET ── -->
  <rect x="378" y="55" width="195" height="300" rx="8" fill="#161b22" stroke="#d29922" stroke-width="2"/>
  <rect x="393" y="70" width="165" height="155" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <circle cx="475" cy="340" r="8" fill="#30363d"/>
  <!-- layout: nav horiz + 2 col -->
  <rect x="400" y="78" width="151" height="14" rx="2" fill="#264de4"/>
  <!-- nav: horizontal links -->
  <rect x="400" y="97" width="35" height="10" rx="2" fill="#30363d"/>
  <rect x="440" y="97" width="35" height="10" rx="2" fill="#30363d"/>
  <rect x="480" y="97" width="35" height="10" rx="2" fill="#30363d"/>
  <!-- cards 2 col -->
  <rect x="400" y="113" width="72" height="55" rx="2" fill="#21262d"/>
  <rect x="478" y="113" width="73" height="55" rx="2" fill="#21262d"/>
  <rect x="400" y="173" width="72" height="40" rx="2" fill="#21262d"/>
  <rect x="478" y="173" width="73" height="40" rx="2" fill="#21262d"/>
  <!-- label -->
  <text x="475" y="252" fill="#8b949e" font-size="10" font-weight="600" text-anchor="middle">768px+</text>
  <text x="475" y="266" fill="#d29922" font-size="11" font-weight="700" text-anchor="middle">@media min-width: 768px</text>
  <text x="475" y="282" fill="#8b949e" font-size="9" text-anchor="middle">nav horizontal · 2 col</text>

  <!-- ── DESKTOP ── -->
  <rect x="606" y="55" width="184" height="300" rx="8" fill="#161b22" stroke="#e34f26" stroke-width="2"/>
  <!-- monitor shape -->
  <rect x="620" y="70" width="156" height="115" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <!-- stand -->
  <rect x="682" y="186" width="32" height="16" rx="2" fill="#30363d"/>
  <rect x="670" y="202" width="56" height="6" rx="2" fill="#30363d"/>
  <!-- header + sidebar + main -->
  <rect x="627" y="77" width="142" height="14" rx="2" fill="#264de4"/>
  <!-- sidebar -->
  <rect x="627" y="96" width="30" height="83" rx="2" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- 3 col main -->
  <rect x="662" y="96" width="35" height="38" rx="2" fill="#21262d"/>
  <rect x="702" y="96" width="35" height="38" rx="2" fill="#21262d"/>
  <rect x="662" y="139" width="35" height="38" rx="2" fill="#21262d"/>
  <rect x="702" y="139" width="35" height="38" rx="2" fill="#21262d"/>
  <!-- row 3 -->
  <rect x="742" y="96" width="27" height="83" rx="2" fill="#21262d"/>
  <!-- label -->
  <text x="698" y="252" fill="#8b949e" font-size="10" font-weight="600" text-anchor="middle">1024px+</text>
  <text x="698" y="266" fill="#e34f26" font-size="11" font-weight="700" text-anchor="middle">@media min-width: 1024px</text>
  <text x="698" y="282" fill="#8b949e" font-size="9" text-anchor="middle">sidebar · 3 columnas</text>

  <!-- Arrows between devices -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#30363d"/>
    </marker>
  </defs>
  <line x1="157" y1="205" x2="183" y2="205" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="352" y1="205" x2="376" y2="205" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="580" y1="205" x2="604" y2="205" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Bottom note -->
  <rect x="30" y="318" width="760" height="56" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="410" y="338" fill="#f0f6fc" font-size="11" font-weight="600" text-anchor="middle">Regla de oro: Mobile-first</text>
  <text x="410" y="354" fill="#8b949e" font-size="10" text-anchor="middle">Escribe los estilos base para mobile (sin @media). Luego añade @media (min-width) en orden creciente.</text>
  <text x="410" y="368" fill="#8b949e" font-size="10" text-anchor="middle">Nunca uses @media (max-width) como estrategia principal: dificulta la lectura y el mantenimiento.</text>
</svg>
