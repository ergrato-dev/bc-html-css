<svg viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="820" height="360" fill="#0d1117"/>
  <text x="410" y="30" font-size="16" fill="#e6edf3" text-anchor="middle" font-weight="bold">display: Comportamiento de los elementos CSS</text>

  <!-- block -->
  <rect x="30" y="50" width="180" height="290" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="120" y="74" font-size="13" fill="#58a6ff" text-anchor="middle" font-weight="bold">block</text>

  <rect x="50" y="85" width="140" height="36" rx="4" fill="#264de4" opacity="0.8"/>
  <text x="120" y="108" font-size="11" fill="white" text-anchor="middle">&lt;div&gt;</text>

  <rect x="50" y="130" width="140" height="36" rx="4" fill="#264de4" opacity="0.8"/>
  <text x="120" y="153" font-size="11" fill="white" text-anchor="middle">&lt;p&gt;</text>

  <rect x="50" y="175" width="140" height="36" rx="4" fill="#264de4" opacity="0.8"/>
  <text x="120" y="198" font-size="11" fill="white" text-anchor="middle">&lt;section&gt;</text>

  <text x="120" y="245" font-size="10" fill="#3fb950" text-anchor="middle">✓ width y height</text>
  <text x="120" y="261" font-size="10" fill="#3fb950" text-anchor="middle">✓ margin/padding todos</text>
  <text x="120" y="277" font-size="10" fill="#3fb950" text-anchor="middle">✓ 100% ancho por defecto</text>
  <text x="120" y="293" font-size="10" fill="#da3633" text-anchor="middle">✗ no fluye en línea</text>
  <text x="120" y="309" font-size="10" fill="#8b949e" text-anchor="middle">div, p, h1-h6, ul, section...</text>

  <!-- inline -->
  <rect x="230" y="50" width="180" height="290" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="320" y="74" font-size="13" fill="#e34f26" text-anchor="middle" font-weight="bold">inline</text>

  <text x="245" y="105" font-size="11" fill="#c9d1d9">Texto con </text>
  <rect x="310" y="87" width="48" height="22" rx="3" fill="#e34f26" opacity="0.8"/>
  <text x="334" y="103" font-size="11" fill="white" text-anchor="middle">&lt;a&gt;</text>
  <text x="365" y="105" font-size="11" fill="#c9d1d9"> y </text>
  <rect x="386" y="87" width="0" height="22"/>

  <text x="245" y="128" font-size="11" fill="#c9d1d9">también </text>
  <rect x="302" y="110" width="68" height="22" rx="3" fill="#e34f26" opacity="0.8"/>
  <text x="336" y="126" font-size="11" fill="white" text-anchor="middle">&lt;span&gt;</text>
  <text x="376" y="128" font-size="11" fill="#c9d1d9"> aquí.</text>

  <text x="320" y="189" font-size="10" fill="#da3633" text-anchor="middle">✗ width ignorado</text>
  <text x="320" y="205" font-size="10" fill="#da3633" text-anchor="middle">✗ height ignorado</text>
  <text x="320" y="221" font-size="10" fill="#da3633" text-anchor="middle">✗ margin vertical: visual</text>
  <text x="320" y="237" font-size="10" fill="#3fb950" text-anchor="middle">✓ fluye dentro del texto</text>
  <text x="320" y="253" font-size="10" fill="#3fb950" text-anchor="middle">✓ padding horizontal ok</text>
  <text x="320" y="275" font-size="10" fill="#8b949e" text-anchor="middle">a, span, strong, em,</text>
  <text x="320" y="291" font-size="10" fill="#8b949e" text-anchor="middle">label, button, img...</text>

  <!-- inline-block -->
  <rect x="430" y="50" width="180" height="290" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="520" y="74" font-size="13" fill="#3fb950" text-anchor="middle" font-weight="bold">inline-block</text>

  <rect x="445" y="87" width="70" height="36" rx="4" fill="#3fb950" opacity="0.7"/>
  <text x="480" y="108" font-size="11" fill="white" text-anchor="middle">.badge</text>

  <rect x="525" y="87" width="70" height="36" rx="4" fill="#3fb950" opacity="0.7"/>
  <text x="560" y="108" font-size="11" fill="white" text-anchor="middle">.btn</text>

  <rect x="445" y="130" width="148" height="36" rx="4" fill="#3fb950" opacity="0.5"/>
  <text x="519" y="153" font-size="11" fill="white" text-anchor="middle">nav li</text>

  <text x="520" y="209" font-size="10" fill="#3fb950" text-anchor="middle">✓ width y height</text>
  <text x="520" y="225" font-size="10" fill="#3fb950" text-anchor="middle">✓ margin/padding todos</text>
  <text x="520" y="241" font-size="10" fill="#3fb950" text-anchor="middle">✓ fluye en línea</text>
  <text x="520" y="257" font-size="10" fill="#3fb950" text-anchor="middle">= block + inline</text>
  <text x="520" y="279" font-size="10" fill="#8b949e" text-anchor="middle">botones, badges, nav items</text>
  <text x="520" y="295" font-size="10" fill="#8b949e" text-anchor="middle">antes de Flexbox/Grid</text>

  <!-- none + visibility -->
  <rect x="630" y="50" width="165" height="290" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="712" y="74" font-size="13" fill="#8b949e" text-anchor="middle" font-weight="bold">none / hidden</text>

  <text x="645" y="100" font-size="10" fill="#da3633">display: none</text>
  <rect x="645" y="108" width="55" height="26" rx="3" fill="#264de4" opacity="0.7"/>
  <text x="672" y="126" font-size="9" fill="white" text-anchor="middle">A</text>
  <!-- gap where B would be -->
  <rect x="726" y="108" width="55" height="26" rx="3" fill="#264de4" opacity="0.7"/>
  <text x="753" y="126" font-size="9" fill="white" text-anchor="middle">C</text>
  <text x="700" y="150" font-size="9" fill="#8b949e" text-anchor="middle">B desaparece y no ocupa espacio</text>

  <line x1="645" y1="165" x2="778" y2="165" stroke="#30363d" stroke-width="1"/>

  <text x="645" y="182" font-size="10" fill="#f0e68c">visibility: hidden</text>
  <rect x="645" y="190" width="55" height="26" rx="3" fill="#264de4" opacity="0.7"/>
  <text x="672" y="208" font-size="9" fill="white" text-anchor="middle">A</text>
  <rect x="701" y="190" width="55" height="26" rx="3" fill="#30363d" stroke="#30363d" stroke-dasharray="3,2"/>
  <text x="728" y="208" font-size="9" fill="#30363d" text-anchor="middle">B</text>
  <rect x="757" y="190" width="0" height="26"/>
  <text x="712" y="232" font-size="9" fill="#8b949e" text-anchor="middle">B invisible pero sigue ocupando</text>

  <text x="712" y="265" font-size="10" fill="#c9d1d9" text-anchor="middle">Diferencia clave:</text>
  <text x="712" y="281" font-size="10" fill="#da3633" text-anchor="middle">none = no existe en layout</text>
  <text x="712" y="297" font-size="10" fill="#f0e68c" text-anchor="middle">hidden = existe, invisible</text>

  <!-- bottom comparison legend -->
  <line x1="30" y1="348" x2="790" y2="348" stroke="#21262d" stroke-width="1"/>
  <text x="410" y="362" font-size="11" fill="#8b949e" text-anchor="middle">Para layouts modernos usa: display: flex o display: grid (Semanas 07 y 08)</text>
</svg>
