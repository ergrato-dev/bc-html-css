  <text x="255" y="415" fill="#c9d1d9" font-size="11" font-family="'Fira Code', monospace">git commit -m "feat: add index.html"</text>
  <text x="240" y="435" fill="#8b949e" font-size="11" font-family="'Fira Code', monospace">[main a1b2c3] feat: add index.html</text>
