  <!-- Código HTML con colores de sintaxis -->
  <text x="270" y="88" fill="#8b949e" font-size="12" font-family="'Fira Code', 'Cascadia Code', monospace">&lt;!DOCTYPE html&gt;</text>
  <text x="270" y="106" fill="#7ee787" font-size="12" font-family="'Fira Code', 'Cascadia Code', monospace">&lt;<tspan fill="#e34f26">html</tspan> <tspan fill="#79c0ff">lang</tspan>=<tspan fill="#a5d6ff">"es"</tspan>&gt;</text>
  <text x="270" y="124" fill="#7ee787" font-size="12" font-family="'Fira Code', 'Cascadia Code', monospace">  &lt;<tspan fill="#e34f26">head</tspan>&gt;</text>
  <text x="270" y="142" font-size="12" font-family="'Fira Code', 'Cascadia Code', monospace">    &lt;<tspan fill="#e34f26">meta</tspan> <tspan fill="#79c0ff">charset</tspan>=<tspan fill="#a5d6ff">"UTF-8"</tspan>/&gt;</text>
  <text x="270" y="160" font-size="12" font-family="'Fira Code', 'Cascadia Code', monospace">    &lt;<tspan fill="#e34f26">title</tspan>&gt;<tspan fill="#c9d1d9">Mi Proyecto</tspan>&lt;/<tspan fill="#e34f26">title</tspan>&gt;</text>
  <text x="270" y="178" font-size="12" font-family="'Fira Code', 'Cascadia Code', monospace">    &lt;<tspan fill="#e34f26">link</tspan> <tspan fill="#79c0ff">rel</tspan>=<tspan fill="#a5d6ff">"stylesheet"</tspan></text>
  <text x="270" y="196" font-size="12" font-family="'Fira Code', 'Cascadia Code', monospace">         <tspan fill="#79c0ff">href</tspan>=<tspan fill="#a5d6ff">"css/styles.css"</tspan>/&gt;</text>
  <text x="270" y="214" fill="#7ee787" font-size="12" font-family="'Fira Code', 'Cascadia Code', monospace">  &lt;/<tspan fill="#e34f26">head</tspan>&gt;</text>
  <text x="270" y="232" fill="#7ee787" font-size="12" font-family="'Fira Code', 'Cascadia Code', monospace">  &lt;<tspan fill="#e34f26">body</tspan>&gt;</text>
  <text x="270" y="250" font-size="12" font-family="'Fira Code', 'Cascadia Code', monospace">    &lt;<tspan fill="#e34f26">h1</tspan>&gt;<tspan fill="#c9d1d9">Hola Mundo</tspan>&lt;/<tspan fill="#e34f26">h1</tspan>&gt;</text>
  <text x="270" y="268" font-size="12" font-family="'Fira Code', 'Cascadia Code', monospace">    &lt;<tspan fill="#e34f26">p</tspan>&gt;<tspan fill="#c9d1d9">Mi primera página</tspan>&lt;/<tspan fill="#e34f26">p</tspan>&gt;</text>
  <text x="270" y="286" fill="#7ee787" font-size="12" font-family="'Fira Code', 'Cascadia Code', monospace">  &lt;/<tspan fill="#e34f26">body</tspan>&gt;</text>

  <!-- Cursor de edición -->
  <rect x="270" y="291" width="1.5" height="14" fill="#e34f26"/>

