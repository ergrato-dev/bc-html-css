<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="820" height="400" fill="#0d1117"/>
  <text x="410" y="32" font-size="16" fill="#e6edf3" text-anchor="middle" font-weight="bold">El Box Model — Las 4 capas de cada elemento CSS</text>

  <!-- Margin layer -->
  <rect x="60" y="50" width="460" height="310" rx="6" fill="#1c2128" stroke="#e34f26" stroke-width="2"/>
  <text x="290" y="74" font-size="13" fill="#e34f26" text-anchor="middle" font-weight="bold">MARGIN</text>
  <text x="290" y="91" font-size="11" fill="#e34f26" text-anchor="middle">Espacio externo entre este elemento y sus vecinos</text>

  <!-- Border layer -->
  <rect x="100" y="105" width="380" height="225" rx="5" fill="#21262d" stroke="#58a6ff" stroke-width="2"/>
  <text x="290" y="125" font-size="13" fill="#58a6ff" text-anchor="middle" font-weight="bold">BORDER</text>
  <text x="290" y="142" font-size="11" fill="#58a6ff" text-anchor="middle">Línea alrededor del padding</text>

  <!-- Padding layer -->
  <rect x="135" y="153" width="310" height="153" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="290" y="172" font-size="13" fill="#3fb950" text-anchor="middle" font-weight="bold">PADDING</text>
  <text x="290" y="189" font-size="11" fill="#3fb950" text-anchor="middle">Espacio interno entre contenido y border</text>

  <!-- Content -->
  <rect x="175" y="200" width="230" height="82" rx="4" fill="#0d1117" stroke="#f0e68c" stroke-width="2"/>
  <text x="290" y="237" font-size="14" fill="#f0e68c" text-anchor="middle" font-weight="bold">CONTENT</text>
  <text x="290" y="256" font-size="11" fill="#f0e68c" text-anchor="middle">width × height</text>
  <text x="290" y="271" font-size="10" fill="#8b949e" text-anchor="middle">texto, imágenes, hijos</text>

  <!-- Annotations right side -->
  <text x="580" y="60" font-size="13" fill="#e6edf3" font-weight="bold">Fórmulas del ancho total</text>

  <rect x="555" y="75" width="230" height="78" rx="5" fill="#1c2128" stroke="#e34f26"/>
  <text x="670" y="97" font-size="11" fill="#da3633" text-anchor="middle" font-weight="bold">content-box (default)</text>
  <text x="670" y="114" font-size="10" fill="#8b949e" text-anchor="middle">ancho total =</text>
  <text x="670" y="130" font-size="10" fill="#c9d1d9" text-anchor="middle">width + padding×2 + border×2</text>
  <text x="670" y="146" font-size="10" fill="#8b949e" text-anchor="middle">⚠️ padding y border suman AFUERA</text>

  <rect x="555" y="165" width="230" height="78" rx="5" fill="#1c2128" stroke="#3fb950"/>
  <text x="670" y="187" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="bold">border-box ✅ recomendado</text>
  <text x="670" y="204" font-size="10" fill="#8b949e" text-anchor="middle">ancho total = width</text>
  <text x="670" y="220" font-size="10" fill="#c9d1d9" text-anchor="middle">padding y border están DENTRO</text>
  <text x="670" y="236" font-size="10" fill="#8b949e" text-anchor="middle">el content se ajusta solo</text>

  <!-- Example calc -->
  <rect x="555" y="255" width="230" height="90" rx="5" fill="#1c2128" stroke="#30363d"/>
  <text x="670" y="275" font-size="11" fill="#e6edf3" text-anchor="middle" font-weight="bold">Ejemplo</text>
  <text x="570" y="295" font-size="10" fill="#8b949e">width: 200px  padding: 20px  border: 2px</text>
  <text x="575" y="314" font-size="10" fill="#da3633">content-box → 200+40+4 = 244px</text>
  <text x="575" y="330" font-size="10" fill="#3fb950">border-box  → 200px exactos ✓</text>

  <!-- Reset snippet -->
  <rect x="555" y="355" width="230" height="35" rx="5" fill="#161b22" stroke="#264de4"/>
  <text x="670" y="369" font-size="10" fill="#58a6ff" text-anchor="middle" font-family="monospace">*, *::before, *::after {</text>
  <text x="670" y="383" font-size="10" fill="#58a6ff" text-anchor="middle" font-family="monospace">  box-sizing: border-box; }</text>
</svg>
