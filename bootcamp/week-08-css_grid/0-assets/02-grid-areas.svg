<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" width="820" height="400" font-family="Inter, system-ui, sans-serif">
  <rect width="820" height="400" fill="#0d1117"/>
  <text x="410" y="28" text-anchor="middle" fill="#f0f6fc" font-size="15" font-weight="700">CSS Grid — Areas Nombradas y Responsive</text>

  <!-- ============================
       LEFT: Desktop layout
  ============================== -->
  <text x="20" y="52" fill="#8b949e" font-size="10" font-weight="600">Desktop (>768px) — grid-template-areas</text>

  <!-- Container desktop -->
  <rect x="20" y="60" width="370" height="300" rx="6" fill="#161b22" stroke="#264de4" stroke-width="1.5"/>

  <!-- HEADER -->
  <rect x="28" y="68" width="354" height="44" rx="4" fill="#264de4" opacity="0.85"/>
  <text x="205" y="95" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">header</text>

  <!-- SIDEBAR -->
  <rect x="28" y="120" width="90" height="180" rx="4" fill="#e34f26" opacity="0.8"/>
  <text x="73" y="214" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">sidebar</text>

  <!-- MAIN -->
  <rect x="126" y="120" width="256" height="180" rx="4" fill="#3fb950" opacity="0.75"/>
  <text x="254" y="214" text-anchor="middle" fill="#0d1117" font-size="11" font-weight="700">main</text>

  <!-- FOOTER -->
  <rect x="28" y="308" width="354" height="44" rx="4" fill="#264de4" opacity="0.55"/>
  <text x="205" y="335" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">footer</text>

  <!-- Column measure -->
  <line x1="28" y1="360" x2="116" y2="360" stroke="#e34f26" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="116" y1="360" x2="382" y2="360" stroke="#3fb950" stroke-width="1.5"/>
  <text x="72" y="375" text-anchor="middle" fill="#e34f26" font-size="9">240px</text>
  <text x="249" y="375" text-anchor="middle" fill="#3fb950" font-size="9">1fr</text>

  <!-- CSS code -->
  <rect x="20" y="380" width="370" height="16" rx="3" fill="#161b22"/>
  <text x="30" y="393" fill="#8b949e" font-size="9" font-family="monospace">grid-template-columns: 240px 1fr;</text>

  <!-- ============================
       MIDDLE: Areas code block
  ============================== -->
  <rect x="415" y="60" width="190" height="180" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1.2"/>
  <text x="425" y="78" fill="#8b949e" font-size="9" font-weight="600">grid-template-areas:</text>
  <text x="425" y="96"  fill="#3fb950" font-size="10" font-family="monospace">"header  header"</text>
  <text x="425" y="112" fill="#3fb950" font-size="10" font-family="monospace">"sidebar main"</text>
  <text x="425" y="128" fill="#3fb950" font-size="10" font-family="monospace">"footer  footer"</text>
  <text x="425" y="148" fill="#8b949e" font-size="9" font-weight="600">Naming:</text>
  <text x="425" y="163" fill="#c9d1d9" font-size="9" font-family="monospace">.header  { grid-area: header; }</text>
  <text x="425" y="176" fill="#c9d1d9" font-size="9" font-family="monospace">.sidebar { grid-area: sidebar; }</text>
  <text x="425" y="189" fill="#c9d1d9" font-size="9" font-family="monospace">.main    { grid-area: main; }</text>
  <text x="425" y="202" fill="#c9d1d9" font-size="9" font-family="monospace">.footer  { grid-area: footer; }</text>
  <text x="425" y="222" fill="#8b949e" font-size="9" font-weight="600">Spanning:</text>
  <text x="425" y="237" fill="#f0e68c" font-size="9" font-family="monospace">.hero { grid-column: 1 / -1; }</text>

  <!-- Arrow down: desktop → mobile -->
  <line x1="510" y1="248" x2="510" y2="268" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="510" y="262" text-anchor="middle" fill="#8b949e" font-size="9">@media ≤768px</text>

  <!-- ============================
       BOTTOM RIGHT: Mobile layout
  ============================== -->
  <text x="415" y="296" fill="#8b949e" font-size="10" font-weight="600">Mobile (≤768px) — 1 columna</text>

  <rect x="415" y="304" width="190" height="88" rx="6" fill="#161b22" stroke="#e34f26" stroke-width="1.5"/>
  <rect x="423" y="311" width="174" height="16" rx="3" fill="#264de4" opacity="0.85"/>
  <text x="510" y="323" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">header</text>
  <rect x="423" y="332" width="174" height="18" rx="3" fill="#3fb950" opacity="0.75"/>
  <text x="510" y="345" text-anchor="middle" fill="#0d1117" font-size="8" font-weight="700">main</text>
  <rect x="423" y="355" width="174" height="14" rx="3" fill="#e34f26" opacity="0.7"/>
  <text x="510" y="366" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">sidebar</text>
  <rect x="423" y="374" width="174" height="14" rx="3" fill="#264de4" opacity="0.5"/>
  <text x="510" y="384" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">footer</text>

  <!-- ============================
       RIGHT PANEL: span demo
  ============================== -->
  <text x="625" y="52" fill="#8b949e" font-size="10" font-weight="600">grid-column / grid-row / span</text>

  <rect x="625" y="60" width="175" height="200" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>

  <!-- 3-col grid with span -->
  <!-- Wide item: col 1/-1 -->
  <rect x="632" y="68" width="161" height="28" rx="3" fill="#f0e68c" opacity="0.9"/>
  <text x="712" y="86" text-anchor="middle" fill="#0d1117" font-size="9" font-weight="700">grid-column: 1 / -1 (toda la fila)</text>

  <!-- Normal items -->
  <rect x="632" y="102" width="48" height="40" rx="3" fill="#264de4" opacity="0.8"/>
  <text x="656" y="124" text-anchor="middle" fill="#fff" font-size="9">Item</text>

  <rect x="685" y="102" width="48" height="40" rx="3" fill="#264de4" opacity="0.6"/>
  <text x="709" y="124" text-anchor="middle" fill="#fff" font-size="9">Item</text>

  <!-- Tall item: row span 2 -->
  <rect x="738" y="102" width="49" height="92" rx="3" fill="#3fb950" opacity="0.8"/>
  <text x="762" y="150" text-anchor="middle" fill="#0d1117" font-size="8" font-weight="700">row</text>
  <text x="762" y="162" text-anchor="middle" fill="#0d1117" font-size="8" font-weight="700">span</text>
  <text x="762" y="174" text-anchor="middle" fill="#0d1117" font-size="8" font-weight="700">2</text>

  <rect x="632" y="148" width="48" height="46" rx="3" fill="#264de4" opacity="0.5"/>
  <text x="656" y="175" text-anchor="middle" fill="#fff" font-size="9">Item</text>

  <!-- span 2 item -->
  <rect x="685" y="148" width="48" height="46" rx="3" fill="#e34f26" opacity="0.8"/>
  <text x="709" y="165" text-anchor="middle" fill="#fff" font-size="8">col</text>
  <text x="709" y="177" text-anchor="middle" fill="#fff" font-size="8">span 2</text>

  <!-- span labels -->
  <text x="636" y="214" fill="#f0e68c" font-size="9" font-family="monospace">.hero { grid-column: 1 / -1; }</text>
  <text x="636" y="228" fill="#3fb950" font-size="9" font-family="monospace">.tall { grid-row: span 2; }</text>
  <text x="636" y="242" fill="#e34f26" font-size="9" font-family="monospace">.wide { grid-column: span 2; }</text>

  <!-- minmax autogrid code -->
  <rect x="625" y="275" width="175" height="55" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="635" y="290" fill="#8b949e" font-size="9" font-weight="600">Auto responsive:</text>
  <text x="635" y="305" fill="#f0e68c" font-size="8.5" font-family="monospace">repeat(auto-fit,</text>
  <text x="635" y="318" fill="#f0e68c" font-size="8.5" font-family="monospace">  minmax(200px, 1fr))</text>
  <text x="635" y="328" fill="#8b949e" font-size="8">sin media queries</text>

  <!-- Marker defs -->
  <defs>
    <marker id="arrowR" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#e34f26"/>
    </marker>
    <marker id="arrowDown" markerWidth="6" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,0 L6,0 L3,8 z" fill="#8b949e"/>
    </marker>
  </defs>
</svg>
