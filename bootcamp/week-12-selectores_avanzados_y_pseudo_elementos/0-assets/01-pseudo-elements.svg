<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440">
  <!-- Background -->
  <rect width="820" height="440" fill="#0d1117"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#e6edf3">Pseudo-elementos CSS: ::before y ::after</text>

  <!-- ── COLUMN 1: ::before concept ── -->
  <rect x="24" y="56" width="230" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="139" y="80" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#58a6ff">::before</text>

  <!-- element box -->
  <rect x="44" y="92" width="190" height="68" rx="6" fill="#1c2128" stroke="#3d444d" stroke-width="1"/>
  <!-- ::before pseudo-element -->
  <rect x="52" y="100" width="50" height="28" rx="4" fill="#1f6feb" opacity="0.8"/>
  <text x="77" y="119" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#fff">::before</text>
  <!-- content area -->
  <rect x="110" y="100" width="116" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="168" y="119" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">contenido real</text>
  <!-- label -->
  <text x="139" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">se inserta ANTES del contenido</text>

  <!-- ── COLUMN 2: ::after concept ── -->
  <rect x="295" y="56" width="230" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="410" y="80" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#3fb950">::after</text>

  <!-- element box -->
  <rect x="315" y="92" width="190" height="68" rx="6" fill="#1c2128" stroke="#3d444d" stroke-width="1"/>
  <!-- content area -->
  <rect x="323" y="100" width="116" height="28" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="381" y="119" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">contenido real</text>
  <!-- ::after pseudo-element -->
  <rect x="447" y="100" width="50" height="28" rx="4" fill="#238636" opacity="0.8"/>
  <text x="472" y="119" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#fff">::after</text>
  <!-- label -->
  <text x="410" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">se inserta DESPUÉS del contenido</text>

  <!-- ── COLUMN 3: content property ── -->
  <rect x="566" y="56" width="230" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="681" y="80" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#e3b341">content (obligatorio)</text>
  <text x="681" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">valores posibles:</text>
  <text x="586" y="118" font-family="'Courier New', monospace" font-size="10" fill="#58a6ff">""</text>
  <text x="600" y="118" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e"> — vacío (para decoración)</text>
  <text x="586" y="134" font-family="'Courier New', monospace" font-size="10" fill="#58a6ff">"texto"</text>
  <text x="630" y="134" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e"> — texto literal</text>
  <text x="586" y="150" font-family="'Courier New', monospace" font-size="10" fill="#58a6ff">attr(data-*)</text>
  <text x="662" y="150" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e"> — del HTML</text>
  <text x="586" y="166" font-family="'Courier New', monospace" font-size="10" fill="#f78166">omitido</text>
  <text x="630" y="166" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e"> → no se renderiza</text>

  <!-- ── USE CASES ROW ── -->
  <!-- Case 1: Decorative bullet -->
  <rect x="24" y="200" width="182" height="110" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="34" y="220" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#58a6ff">Bullet decorativo</text>
  <text x="34" y="238" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">li::before {</text>
  <text x="34" y="252" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">  content: "▸ ";</text>
  <text x="34" y="266" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">  color: var(--primary);</text>
  <text x="34" y="280" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">}</text>
  <!-- preview -->
  <text x="34" y="298" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#3fb950">▸ </text>
  <text x="48" y="298" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">Item de lista</text>

  <!-- Case 2: Ribbon -->
  <rect x="220" y="200" width="182" height="110" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="230" y="220" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#3fb950">Ribbon esquina</text>
  <text x="230" y="238" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">.card::before {</text>
  <text x="230" y="252" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">  content: "NUEVO";</text>
  <text x="230" y="266" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">  position: absolute;</text>
  <text x="230" y="280" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">  transform: rotate(45deg);</text>
  <text x="230" y="294" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">}</text>

  <!-- Case 3: Tooltip -->
  <rect x="416" y="200" width="182" height="110" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="426" y="220" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#e3b341">Tooltip con attr()</text>
  <text x="426" y="238" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">[data-tooltip]::after {</text>
  <text x="426" y="252" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">  content: attr(</text>
  <text x="426" y="266" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">    data-tooltip</text>
  <text x="426" y="280" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">  );</text>
  <text x="426" y="294" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">}</text>

  <!-- Case 4: Line decoration -->
  <rect x="612" y="200" width="184" height="110" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="622" y="220" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#d2a8ff">Línea decorativa</text>
  <text x="622" y="238" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">.title::before {</text>
  <text x="622" y="252" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">  content: "";</text>
  <text x="622" y="266" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">  position: absolute;</text>
  <text x="622" y="280" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">  width: 4px; </text>
  <text x="622" y="294" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">  background: var(--primary);</text>


  <!-- ── IMPORTANT NOTES ROW ── -->
  <rect x="24" y="328" width="772" height="90" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="40" y="350" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#e3b341">⚠ Reglas importantes</text>

  <!-- Note 1 -->
  <circle cx="52" cy="372" r="4" fill="#58a6ff"/>
  <text x="62" y="376" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e6edf3">content es OBLIGATORIO (aunque sea "").</text>

  <!-- Note 2 -->
  <circle cx="52" cy="394" r="4" fill="#3fb950"/>
  <text x="62" y="398" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e6edf3">Son inline por defecto → usa display: block/inline-block para darles width/height.</text>

  <!-- Note 3 -->
  <circle cx="310" cy="372" r="4" fill="#e3b341"/>
  <text x="320" y="376" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e6edf3">Para posición absoluta: el padre necesita position: relative.</text>

  <!-- Note 4 -->
  <circle cx="310" cy="394" r="4" fill="#d2a8ff"/>
  <text x="320" y="398" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e6edf3">No son accesibles para lectores de pantalla → úsalos solo para decoración.</text>
</svg>
