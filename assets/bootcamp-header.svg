<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">

  <!-- ── Background ── -->
  <rect width="1200" height="400" fill="#0d1117"/>

  <!-- Subtle grid texture -->
  <line x1="0"   y1="133" x2="1200" y2="133" stroke="#161b22" stroke-width="1"/>
  <line x1="0"   y1="267" x2="1200" y2="267" stroke="#161b22" stroke-width="1"/>
  <line x1="400" y1="0"   x2="400"  y2="400" stroke="#161b22" stroke-width="1"/>
  <line x1="800" y1="0"   x2="800"  y2="400" stroke="#161b22" stroke-width="1"/>

  <!-- Left accent bar — HTML orange (top) / CSS blue (bottom) -->
  <rect x="0" y="0"   width="5" height="200" fill="#E34F26"/>
  <rect x="0" y="200" width="5" height="200" fill="#264de4"/>

  <!-- ── Background decorative code — HTML (top-left) ── -->
  <text x="30" y="44"  font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" fill="#E34F26" opacity="0.20">&lt;!DOCTYPE html&gt;</text>
  <text x="30" y="64"  font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" fill="#8b949e" opacity="0.14">&lt;html lang="es"&gt;</text>
  <text x="30" y="84"  font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" fill="#8b949e" opacity="0.09">&lt;head&gt;&lt;meta charset="UTF-8"&gt;&lt;/head&gt;</text>
  <text x="30" y="104" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" fill="#8b949e" opacity="0.07">&lt;body class="bootcamp"&gt;</text>

  <!-- ── Background decorative code — CSS (bottom-right) ── -->
  <text x="930" y="308" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" fill="#264de4" opacity="0.20">:root {</text>
  <text x="930" y="328" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" fill="#8b949e" opacity="0.14">  --color-primary: #E34F26;</text>
  <text x="930" y="348" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" fill="#8b949e" opacity="0.09">  display: flex;</text>
  <text x="930" y="368" font-family="'JetBrains Mono','Fira Code','Consolas',monospace" font-size="12" fill="#264de4" opacity="0.20">}</text>

  <!-- ── Large decorative angle brackets (behind content) ── -->
  <text x="5"    y="285" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="240" font-weight="900" fill="#E34F26" opacity="0.04">&lt;</text>
  <text x="1000" y="320" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="190" font-weight="900" fill="#264de4" opacity="0.04">/&gt;</text>

  <!-- ── MAIN CONTENT ── -->

  <!-- Eyebrow -->
  <text x="600" y="120"
        font-family="Inter,'Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#484f58"
        text-anchor="middle" letter-spacing="4">BOOTCAMP · ZERO TO HERO</text>

  <!-- Main title: HTML + CSS -->
  <text x="600" y="212"
        font-family="Inter,'Segoe UI',system-ui,-apple-system,sans-serif"
        font-size="96" font-weight="800" letter-spacing="-3"
        text-anchor="middle">
    <tspan fill="#E34F26">HTML</tspan><tspan fill="#484f58" font-weight="300" letter-spacing="2"> + </tspan><tspan fill="#264de4">CSS</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="253"
        font-family="Inter,'Segoe UI',system-ui,sans-serif"
        font-size="16" font-weight="400" fill="#8b949e"
        text-anchor="middle" letter-spacing="5">DE CERO A FRONTEND DEVELOPER</text>

  <!-- Separator -->
  <line x1="494" y1="273" x2="706" y2="273" stroke="#30363d" stroke-width="1"/>

  <!-- ── Stats pills — centered total width ≈ 440px (x: 380–820) ── -->

  <!-- Pill 1: 13 Semanas -->
  <rect x="380" y="289" width="138" height="32" rx="16" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="449" y="310"
        font-family="Inter,'Segoe UI',system-ui,sans-serif"
        font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">13 Semanas</text>

  <!-- dot separator -->
  <circle cx="534" cy="305" r="2" fill="#30363d"/>

  <!-- Pill 2: 104 Horas -->
  <rect x="550" y="289" width="124" height="32" rx="16" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="612" y="310"
        font-family="Inter,'Segoe UI',system-ui,sans-serif"
        font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">104 Horas</text>

  <!-- dot separator -->
  <circle cx="690" cy="305" r="2" fill="#30363d"/>

  <!-- Pill 3: 8h / semana -->
  <rect x="706" y="289" width="114" height="32" rx="16" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="763" y="310"
        font-family="Inter,'Segoe UI',system-ui,sans-serif"
        font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">8h / semana</text>

  <!-- Bottom attribution -->
  <text x="600" y="368"
        font-family="Inter,'Segoe UI',system-ui,sans-serif"
        font-size="11" fill="#30363d" text-anchor="middle" letter-spacing="1">
    ergrato-dev  ·  github.com/ergrato-dev/bc-html-css
  </text>

  <!-- Top / bottom hairlines -->
  <line x1="6" y1="0"   x2="1200" y2="0"   stroke="#21262d" stroke-width="1"/>
  <line x1="0" y1="399" x2="1200" y2="399" stroke="#21262d" stroke-width="1"/>

</svg>
