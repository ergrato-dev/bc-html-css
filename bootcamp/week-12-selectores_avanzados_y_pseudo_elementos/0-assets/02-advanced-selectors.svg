<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440">
  <!-- Background -->
  <rect width="820" height="440" fill="#0d1117"/>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="700" fill="#e6edf3">Selectores Avanzados CSS</text>

  <!-- ── ROW 1: :nth-child patterns ── -->
  <!-- Header -->
  <text x="24" y="60" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b949e">:nth-child — PATRONES</text>

  <!-- Pattern 1: even/odd -->
  <rect x="24" y="68" width="176" height="78" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="34" y="86" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#58a6ff">:nth-child(even)</text>
  <!-- mini table rows -->
  <rect x="34" y="92" width="156" height="14" rx="2" fill="#21262d"/>
  <text x="42" y="103" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">fila 1 — sin estilo</text>
  <rect x="34" y="108" width="156" height="14" rx="2" fill="#1f3a5f"/>
  <text x="42" y="119" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#58a6ff">fila 2 — destacada</text>
  <rect x="34" y="124" width="156" height="14" rx="2" fill="#21262d"/>
  <text x="42" y="135" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">fila 3 — sin estilo</text>

  <!-- Pattern 2: 3n+1 -->
  <rect x="212" y="68" width="176" height="78" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="222" y="86" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#3fb950">:nth-child(3n+1)</text>
  <rect x="222" y="92" width="156" height="14" rx="2" fill="#1b3a2a"/>
  <text x="230" y="103" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#3fb950">item 1 ✓ (0×3+1)</text>
  <rect x="222" y="108" width="156" height="14" rx="2" fill="#21262d"/>
  <text x="230" y="119" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">item 2</text>
  <rect x="222" y="124" width="156" height="14" rx="2" fill="#21262d"/>
  <text x="230" y="135" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">item 3</text>

  <!-- Pattern 3: -n+3 (first 3) -->
  <rect x="400" y="68" width="176" height="78" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="410" y="86" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#e3b341">:nth-child(-n+3)</text>
  <rect x="410" y="92" width="156" height="14" rx="2" fill="#3a2f0a"/>
  <text x="418" y="103" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#e3b341">item 1 ✓</text>
  <rect x="410" y="108" width="156" height="14" rx="2" fill="#3a2f0a"/>
  <text x="418" y="119" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#e3b341">item 2 ✓</text>
  <rect x="410" y="124" width="156" height="14" rx="2" fill="#3a2f0a"/>
  <text x="418" y="135" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#e3b341">item 3 ✓</text>

  <!-- Pattern 4: nth-last-child -->
  <rect x="588" y="68" width="208" height="78" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="598" y="86" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#d2a8ff">:nth-last-child(1)</text>
  <rect x="598" y="92" width="188" height="14" rx="2" fill="#21262d"/>
  <text x="606" y="103" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">item penúltimo</text>
  <rect x="598" y="108" width="188" height="14" rx="2" fill="#2a1f3a"/>
  <text x="606" y="119" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#d2a8ff">item último ✓ (desde el final)</text>
  <rect x="598" y="124" width="188" height="14" rx="2" fill="#21262d"/>
  <text x="606" y="135" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">cuenta al revés →</text>

  <!-- ── ROW 2: :is :where :not :has ── -->
  <text x="24" y="170" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b949e">SELECTORES FUNCIONALES</text>

  <!-- :not -->
  <rect x="24" y="178" width="184" height="98" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="34" y="196" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#f78166">:not(selector)</text>
  <text x="34" y="212" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">excluye el selector dado</text>
  <text x="34" y="230" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">li:not(:last-child) {</text>
  <text x="34" y="244" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">  border-bottom: 1px solid;</text>
  <text x="34" y="258" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">}</text>
  <text x="34" y="272" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">especificidad del arg.</text>

  <!-- :is -->
  <rect x="220" y="178" width="184" height="98" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="230" y="196" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#58a6ff">:is(…)</text>
  <text x="230" y="212" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">agrupa selectores</text>
  <text x="230" y="230" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">:is(article, aside)</text>
  <text x="230" y="244" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">  :is(h1, h2, h3) {</text>
  <text x="230" y="258" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">  color: var(--text);</text>
  <text x="230" y="272" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#e3b341">especif. = más alto del grupo</text>

  <!-- :where -->
  <rect x="416" y="178" width="184" height="98" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="426" y="196" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#3fb950">:where(…)</text>
  <text x="426" y="212" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">igual a :is() pero…</text>
  <text x="426" y="230" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">:where(h1, h2, h3) {</text>
  <text x="426" y="244" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">  line-height: 1.2;</text>
  <text x="426" y="258" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">}</text>
  <text x="426" y="272" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#3fb950">especificidad SIEMPRE = 0</text>

  <!-- :has -->
  <rect x="612" y="178" width="184" height="98" rx="6" fill="#161b22" stroke="#ff7b72" stroke-width="1.5"/>
  <text x="622" y="196" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#ff7b72">:has(hijo)</text>
  <text x="622" y="212" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e">selector PARENTAL ← nuevo</text>
  <text x="622" y="230" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">form:has(input:invalid)</text>
  <text x="622" y="244" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">  { border: 2px solid red; }</text>
  <text x="622" y="262" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#ff7b72">Soportado Chrome 105+ / FF 121+</text>

  <!-- ── ROW 3: Attribute selectors + form states ── -->
  <text x="24" y="302" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#8b949e">SELECTORES DE ATRIBUTO Y ESTADOS DE FORMULARIO</text>

  <!-- Attribute selectors table -->
  <rect x="24" y="310" width="384" height="108" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="34" y="328" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#e3b341">Selectores de atributo [attr]</text>

  <text x="34" y="346" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">[href]</text>
  <text x="100" y="346" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">tiene el atributo href (cualquier valor)</text>
  <text x="34" y="360" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">[type="email"]</text>
  <text x="130" y="360" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">valor exacto "email"</text>
  <text x="34" y="374" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">[href^="https"]</text>
  <text x="140" y="374" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">empieza con "https"</text>
  <text x="34" y="388" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">[href$=".pdf"]</text>
  <text x="130" y="388" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">termina con ".pdf"</text>
  <text x="34" y="402" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">[class*="btn"]</text>
  <text x="130" y="402" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">contiene "btn" en cualquier posición</text>

  <!-- Form states -->
  <rect x="420" y="310" width="376" height="108" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="430" y="328" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#d2a8ff">Estados de formulario</text>

  <text x="430" y="346" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">:checked</text>
  <text x="510" y="346" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">checkbox/radio marcado</text>
  <text x="430" y="360" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">:valid / :invalid</text>
  <text x="540" y="360" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">validación HTML5 nativa</text>
  <text x="430" y="374" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">:focus-within</text>
  <text x="530" y="374" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">padre con un hijo enfocado</text>
  <text x="430" y="388" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">:placeholder-shown</text>
  <text x="566" y="388" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">el placeholder es visible</text>
  <text x="430" y="402" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">:disabled / :enabled</text>
  <text x="564" y="402" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#8b949e">estado del control de formulario</text>
</svg>
