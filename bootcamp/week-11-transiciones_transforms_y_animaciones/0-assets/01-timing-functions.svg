<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="820" height="420" fill="#0d1117"/>

  <!-- Title -->
  <text x="30" y="38" font-size="18" font-weight="700" fill="#f0f6fc">Timing Functions — Curvas de Aceleración</text>
  <text x="30" y="58" font-size="12" fill="#8b949e">Cada curva define cómo cambia la velocidad de una transición o animación</text>

  <!-- Grid lines -->
  <line x1="80" y1="80" x2="80" y2="350" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="350" x2="760" y2="350" stroke="#21262d" stroke-width="1"/>

  <!-- Curve area for each function — 6 columns -->
  <!-- Column positions: 80, 195, 310, 425, 540, 655 (each 115px wide) -->

  <!-- --- ease --- -->
  <rect x="80" y="80" width="100" height="110" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="130" y="100" font-size="10" fill="#7d8590" text-anchor="middle">ease</text>
  <!-- Curve path: slow start, fast middle, slow end -->
  <path d="M90 180 C100 180 105 100 135 98 S165 175 170 175" stroke="#58a6ff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="130" y="200" font-size="9" fill="#58a6ff" text-anchor="middle">Rápido al inicio</text>
  <text x="130" y="212" font-size="9" fill="#58a6ff" text-anchor="middle">Lento al final</text>

  <!-- --- ease-in --- -->
  <rect x="195" y="80" width="100" height="110" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="245" y="100" font-size="10" fill="#7d8590" text-anchor="middle">ease-in</text>
  <path d="M205 178 C210 178 225 175 245 140 S275 100 285 97" stroke="#3fb950" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="245" y="200" font-size="9" fill="#3fb950" text-anchor="middle">Lento → Rápido</text>
  <text x="245" y="212" font-size="9" fill="#3fb950" text-anchor="middle">Salida de pantalla</text>

  <!-- --- ease-out --- -->
  <rect x="310" y="80" width="100" height="110" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="360" y="100" font-size="10" fill="#7d8590" text-anchor="middle">ease-out</text>
  <path d="M320 100 C325 98 340 130 355 155 S385 178 400 178" stroke="#f78166" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="360" y="200" font-size="9" fill="#f78166" text-anchor="middle">Rápido → Lento</text>
  <text x="360" y="212" font-size="9" fill="#f78166" text-anchor="middle">Entrada natural ★</text>

  <!-- --- ease-in-out --- -->
  <rect x="425" y="80" width="100" height="110" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="475" y="100" font-size="10" fill="#7d8590" text-anchor="middle">ease-in-out</text>
  <path d="M435 178 C440 178 450 160 465 138 S490 100 505 100 S520 137 525 155 S530 178 535 178" stroke="#d2a8ff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="475" y="200" font-size="9" fill="#d2a8ff" text-anchor="middle">Lento→Rápido→Lento</text>
  <text x="475" y="212" font-size="9" fill="#d2a8ff" text-anchor="middle">Movimientos suaves</text>

  <!-- --- linear --- -->
  <rect x="540" y="80" width="100" height="110" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="590" y="100" font-size="10" fill="#7d8590" text-anchor="middle">linear</text>
  <line x1="550" y1="178" x2="630" y2="100" stroke="#e3b341" stroke-width="2.5" stroke-linecap="round"/>
  <text x="590" y="200" font-size="9" fill="#e3b341" text-anchor="middle">Velocidad constante</text>
  <text x="590" y="212" font-size="9" fill="#e3b341" text-anchor="middle">Spinners, progreso</text>

  <!-- --- cubic-bezier (spring) --- -->
  <rect x="655" y="80" width="110" height="110" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="710" y="100" font-size="10" fill="#7d8590" text-anchor="middle">cubic-bezier</text>
  <!-- Spring effect: overshoots then settles -->
  <path d="M665 180 C672 178 678 95 695 80 S720 78 730 90 S742 110 750 125 S756 145 758 155 S760 170 763 175" stroke="#ff7b72" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="710" y="200" font-size="9" fill="#ff7b72" text-anchor="middle">Spring / rebote</text>
  <text x="710" y="212" font-size="9" fill="#ff7b72" text-anchor="middle">Efectos especiales</text>

  <!-- Labels bottom row -->
  <text x="30" y="240" font-size="11" fill="#8b949e">Eje X = tiempo transcurrido   |   Eje Y = progreso del valor</text>

  <!-- Code snippet box -->
  <rect x="30" y="260" width="760" height="110" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="283" font-size="11" fill="#7d8590" font-style="italic">/* Ejemplo con Custom Properties */</text>
  <text x="50" y="302" font-size="12" font-family="'Fira Code', monospace" fill="#7ee787">:root</text>
  <text x="50" y="302" font-size="12" font-family="'Fira Code', monospace" fill="#f0f6fc"> {</text>
  <text x="66" y="320" font-size="12" font-family="'Fira Code', monospace" fill="#79c0ff">  --ease-out</text>
  <text x="66" y="320" font-size="12" font-family="'Fira Code', monospace" fill="#f0f6fc">         </text>
  <text x="226" y="320" font-size="12" font-family="'Fira Code', monospace" fill="#e3b341">: ease-out;</text>
  <text x="66" y="338" font-size="12" font-family="'Fira Code', monospace" fill="#79c0ff">  --ease-spring</text>
  <text x="226" y="338" font-size="12" font-family="'Fira Code', monospace" fill="#e3b341">: cubic-bezier(0.34, 1.56, 0.64, 1);</text>
  <text x="50" y="356" font-size="12" font-family="'Fira Code', monospace" fill="#f0f6fc">}</text>

  <!-- Footer -->
  <text x="30" y="400" font-size="11" fill="#484f58">Semana 11 — Bootcamp HTML+CSS · Transiciones, Transforms y Animaciones</text>
  <text x="790" y="400" font-size="11" fill="#484f58" text-anchor="end">01-timing-functions.svg</text>
</svg>
