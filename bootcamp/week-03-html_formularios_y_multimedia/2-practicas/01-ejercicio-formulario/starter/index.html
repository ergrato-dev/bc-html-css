<!DOCTYPE html>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejercicio 01 — Formulario de Contacto</title>
    <style>
      :root { --primary: #e34f26; --surface: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; }
      * { box-sizing: border-box; }
      body { font-family: system-ui, sans-serif; background: #0d1117; color: var(--text); padding: 2rem; max-width: 640px; margin: 0 auto; line-height: 1.6; }
      fieldset { border: 1px solid var(--border); border-radius: 6px; padding: 1.5rem; margin-bottom: 1.5rem; background: var(--surface); }
      legend { color: var(--primary); font-weight: bold; padding: 0 0.5rem; }
      label { display: block; font-size: 0.9rem; margin-top: 1rem; margin-bottom: 0.3rem; color: var(--muted); }
      input, select, textarea { width: 100%; padding: 0.6rem 0.8rem; background: #0d1117; border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 1rem; font-family: inherit; }
      input:focus, select:focus, textarea:focus { outline: 2px solid var(--primary); border-color: var(--primary); }
      button[type="submit"] { margin-top: 1.5rem; width: 100%; padding: 0.75rem; background: var(--primary); color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; }
      button[type="submit"]:hover { opacity: 0.9; }
    </style>
  </head>
