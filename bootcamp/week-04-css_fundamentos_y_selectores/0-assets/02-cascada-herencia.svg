<svg viewBox="0 0 820 440" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="820" height="440" fill="#0d1117"/>
  <text x="410" y="34" font-size="16" fill="#e6edf3" text-anchor="middle" font-weight="bold">Cascada y Herencia CSS</text>

  <!-- Cascade waterfall left side -->
  <text x="200" y="62" font-size="13" fill="#e6edf3" text-anchor="middle" font-weight="bold">La Cascada — Orden de prioridad</text>

  <!-- Levels from lowest to highest -->
  <rect x="40" y="75" width="320" height="42" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="80" y="93" font-size="18" fill="#6e7681">①</text>
  <text x="108" y="91" font-size="12" fill="#6e7681" font-weight="bold">User-Agent Stylesheet</text>
  <text x="108" y="108" font-size="11" fill="#6e7681">Estilos por defecto del navegador</text>

  <rect x="40" y="128" width="320" height="42" rx="6" fill="#161b22" stroke="#264de4"/>
  <text x="80" y="146" font-size="18" fill="#58a6ff">②</text>
  <text x="108" y="144" font-size="12" fill="#58a6ff" font-weight="bold">Estilos del autor (CSS externo)</text>
  <text x="108" y="161" font-size="11" fill="#8b949e">Tu archivo styles.css</text>

  <rect x="40" y="181" width="320" height="42" rx="6" fill="#161b22" stroke="#264de4"/>
  <text x="80" y="199" font-size="18" fill="#79c0ff">③</text>
  <text x="108" y="197" font-size="12" fill="#79c0ff" font-weight="bold">Estilos inline</text>
  <text x="108" y="214" font-size="11" fill="#8b949e">style="" en el HTML — evitar</text>

  <rect x="40" y="234" width="320" height="42" rx="6" fill="#161b22" stroke="#e34f26"/>
  <text x="80" y="252" font-size="18" fill="#e34f26">④</text>
  <text x="108" y="250" font-size="12" fill="#e34f26" font-weight="bold">!important</text>
  <text x="108" y="267" font-size="11" fill="#8b949e">Sobreescribe todo — usar solo en emergencias</text>

  <!-- Arrow indicating increasing priority -->
  <text x="22" y="260" font-size="10" fill="#8b949e" transform="rotate(-90, 22, 200)" text-anchor="middle">← MENOR PRIORIDAD · MAYOR PRIORIDAD →</text>

  <!-- Within same specificity: source order -->
  <rect x="40" y="294" width="320" height="58" rx="6" fill="#1c2128" stroke="#3fb950"/>
  <text x="200" y="316" font-size="12" fill="#3fb950" text-anchor="middle" font-weight="bold">Mismo selector = último en ganar</text>
  <text x="200" y="334" font-size="11" fill="#8b949e" text-anchor="middle">.btn { color: red; }</text>
  <text x="200" y="348" font-size="11" fill="#3fb950" text-anchor="middle">.btn { color: blue; }  ← este gana ✓</text>

  <!-- Inheritance right side -->
  <text x="590" y="62" font-size="13" fill="#e6edf3" text-anchor="middle" font-weight="bold">Herencia — Fluye hacia abajo</text>

  <!-- Tree showing inheritance -->
  <rect x="510" y="75" width="260" height="36" rx="6" fill="#161b22" stroke="#e34f26"/>
  <text x="640" y="98" font-size="12" fill="#e34f26" text-anchor="middle" font-family="monospace">&lt;body&gt; { font-family: sans-serif; }</text>

  <!-- lines down -->
  <line x1="580" y1="111" x2="555" y2="135" stroke="#30363d" stroke-width="1.5"/>
  <line x1="700" y1="111" x2="725" y2="135" stroke="#30363d" stroke-width="1.5"/>

  <rect x="475" y="135" width="155" height="32" rx="5" fill="#161b22" stroke="#58a6ff"/>
  <text x="552" y="154" font-size="11" fill="#58a6ff" text-anchor="middle" font-family="monospace">&lt;header&gt;</text>
  <text x="552" y="166" font-size="9" fill="#3fb950" text-anchor="middle">hereda font-family ✓</text>

  <rect x="645" y="135" width="155" height="32" rx="5" fill="#161b22" stroke="#58a6ff"/>
  <text x="722" y="154" font-size="11" fill="#58a6ff" text-anchor="middle" font-family="monospace">&lt;main&gt;</text>
  <text x="722" y="166" font-size="9" fill="#3fb950" text-anchor="middle">hereda font-family ✓</text>

  <!-- lines down level 3 -->
  <line x1="552" y1="167" x2="552" y2="187" stroke="#30363d" stroke-width="1.5"/>
  <line x1="722" y1="167" x2="700" y2="187" stroke="#30363d" stroke-width="1.5"/>
  <line x1="722" y1="167" x2="744" y2="187" stroke="#30363d" stroke-width="1.5"/>

  <rect x="475" y="187" width="155" height="32" rx="5" fill="#161b22" stroke="#8b949e"/>
  <text x="552" y="206" font-size="11" fill="#8b949e" text-anchor="middle" font-family="monospace">&lt;h1&gt;</text>
  <text x="552" y="218" font-size="9" fill="#3fb950" text-anchor="middle">hereda font-family ✓</text>

  <rect x="635" y="187" width="80" height="32" rx="5" fill="#161b22" stroke="#8b949e"/>
  <text x="675" y="209" font-size="11" fill="#8b949e" text-anchor="middle" font-family="monospace">&lt;p&gt;</text>

  <rect x="725" y="187" width="80" height="32" rx="5" fill="#161b22" stroke="#8b949e"/>
  <text x="765" y="209" font-size="11" fill="#8b949e" text-anchor="middle" font-family="monospace">&lt;a&gt;</text>

  <!-- Inherits vs not -->
  <rect x="460" y="240" width="340" height="80" rx="6" fill="#1c2128" stroke="#30363d"/>
  <text x="630" y="260" font-size="12" fill="#e6edf3" text-anchor="middle" font-weight="bold">¿Qué propiedades se heredan?</text>
  <text x="480" y="280" font-size="11" fill="#3fb950">✓ Sí heredan:</text>
  <text x="480" y="296" font-size="10" fill="#8b949e">color, font-*, line-height, text-*, cursor</text>
  <text x="620" y="280" font-size="11" fill="#da3633">✗ NO heredan:</text>
  <text x="620" y="296" font-size="10" fill="#8b949e">margin, padding, border, background, width</text>

  <!-- Keywords -->
  <rect x="460" y="334" width="340" height="80" rx="6" fill="#1c2128" stroke="#30363d"/>
  <text x="630" y="354" font-size="12" fill="#e6edf3" text-anchor="middle" font-weight="bold">Palabras clave de herencia</text>
  <text x="480" y="376" font-size="11" fill="#58a6ff" font-family="monospace">inherit</text>
  <text x="535" y="376" font-size="10" fill="#8b949e"> — toma el valor del padre</text>
  <text x="480" y="394" font-size="11" fill="#58a6ff" font-family="monospace">initial</text>
  <text x="535" y="394" font-size="10" fill="#8b949e"> — valor inicial del navegador</text>
  <text x="480" y="410" font-size="11" fill="#58a6ff" font-family="monospace">unset</text>
  <text x="528" y="410" font-size="10" fill="#8b949e"> — hereda si puede, si no initial</text>
</svg>
