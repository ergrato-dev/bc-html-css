<svg viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <!-- Background -->
  <rect width="820" height="480" fill="#0d1117"/>

  <!-- Title -->
  <text x="410" y="36" font-size="16" fill="#e6edf3" text-anchor="middle" font-weight="bold">Anatomía de un Formulario HTML</text>

  <!-- form container -->
  <rect x="40" y="55" width="460" height="390" rx="8" fill="#161b22" stroke="#e34f26" stroke-width="2"/>
  <text x="48" y="49" font-size="11" fill="#e34f26" font-family="monospace">&lt;form action="/enviar" method="post"&gt;</text>

  <!-- fieldset 1 -->
  <rect x="60" y="70" width="420" height="120" rx="6" fill="#1f2937" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="80" y="65" font-size="10" fill="#161b22" font-weight="bold">·</text>
  <text x="68" y="88" font-size="10" fill="#58a6ff" font-family="monospace">&lt;fieldset&gt;</text>
  <text x="80" y="104" font-size="11" fill="#79c0ff" font-family="monospace">&lt;legend&gt;Datos personales&lt;/legend&gt;</text>

  <!-- label + input -->
  <rect x="80" y="112" width="180" height="26" rx="4" fill="#21262d" stroke="#30363d"/>
  <text x="90" y="129" font-size="11" fill="#8b949e" font-family="monospace">&lt;label for="nombre"&gt;</text>
  <rect x="270" y="112" width="190" height="26" rx="4" fill="#264de4" fill-opacity="0.3" stroke="#264de4"/>
  <text x="280" y="129" font-size="11" fill="#79c0ff" font-family="monospace">&lt;input id="nombre"&gt;</text>
  <!-- connection line -->
  <line x1="260" y1="125" x2="270" y2="125" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="80" y="148" width="180" height="26" rx="4" fill="#21262d" stroke="#30363d"/>
  <text x="90" y="165" font-size="11" fill="#8b949e" font-family="monospace">&lt;label for="email"&gt;</text>
  <rect x="270" y="148" width="190" height="26" rx="4" fill="#264de4" fill-opacity="0.3" stroke="#264de4"/>
  <text x="280" y="165" font-size="11" fill="#79c0ff" font-family="monospace">&lt;input id="email"&gt;</text>
  <line x1="260" y1="161" x2="270" y2="161" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- fieldset 2 -->
  <rect x="60" y="205" width="420" height="90" rx="6" fill="#1f2937" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="68" y="223" font-size="10" fill="#58a6ff" font-family="monospace">&lt;fieldset&gt;</text>
  <text x="80" y="239" font-size="11" fill="#79c0ff" font-family="monospace">&lt;legend&gt;Preferencias&lt;/legend&gt;</text>

  <rect x="80" y="247" width="380" height="26" rx="4" fill="#21262d" stroke="#30363d"/>
  <text x="90" y="264" font-size="11" fill="#8b949e" font-family="monospace">&lt;textarea id="msg"&gt;...&lt;/textarea&gt;</text>

  <!-- select -->
  <rect x="60" y="310" width="200" height="40" rx="6" fill="#1f2937" stroke="#30363d"/>
  <text x="68" y="325" font-size="10" fill="#8b949e" font-family="monospace">&lt;select id="plan"&gt;</text>
  <text x="80" y="342" font-size="10" fill="#8b949e" font-family="monospace">  &lt;option&gt;Básico&lt;/option&gt;</text>

  <!-- button -->
  <rect x="280" y="310" width="200" height="40" rx="6" fill="#e34f26" fill-opacity="0.3" stroke="#e34f26"/>
  <text x="370" y="335" font-size="13" fill="#e34f26" text-anchor="middle" font-family="monospace" font-weight="bold">&lt;button type="submit"&gt;</text>

  <!-- closing tag -->
  <text x="48" y="458" font-size="11" fill="#e34f26" font-family="monospace">&lt;/form&gt;</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
  </defs>

  <!-- Legend panel (right) -->
  <rect x="520" y="55" width="270" height="280" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="655" y="80" font-size="13" fill="#e6edf3" text-anchor="middle" font-weight="bold">Leyenda</text>

  <!-- Labels -->
  <rect x="540" y="95" width="16" height="16" rx="3" fill="#21262d" stroke="#8b949e"/>
  <text x="563" y="107" font-size="11" fill="#8b949e">&lt;label&gt; — vinculado por for/id</text>

  <rect x="540" y="120" width="16" height="16" rx="3" fill="#264de4" fill-opacity="0.3" stroke="#264de4"/>
  <text x="563" y="132" font-size="11" fill="#79c0ff">&lt;input&gt; — campo de entrada</text>

  <rect x="540" y="145" width="16" height="16" rx="3" fill="#1f2937" stroke="#58a6ff" stroke-dasharray="4,2"/>
  <text x="563" y="157" font-size="11" fill="#58a6ff">&lt;fieldset&gt; — grupo de campos</text>

  <rect x="540" y="170" width="16" height="16" rx="3" fill="#e34f26" fill-opacity="0.3" stroke="#e34f26"/>
  <text x="563" y="182" font-size="11" fill="#e34f26">Botón de envío</text>

  <line x1="540" y1="200" x2="556" y2="200" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="563" y="204" font-size="11" fill="#3fb950">Conexión for ↔ id</text>

  <!-- Atributos clave -->
  <text x="655" y="235" font-size="12" fill="#e6edf3" text-anchor="middle" font-weight="bold">Atributos del &lt;form&gt;</text>
  <text x="540" y="255" font-size="11" fill="#e6edf3"><tspan fill="#ff7b6b">action</tspan> = URL de destino</text>
  <text x="540" y="271" font-size="11" fill="#e6edf3"><tspan fill="#ff7b6b">method</tspan> = GET | POST</text>
  <text x="540" y="287" font-size="11" fill="#e6edf3"><tspan fill="#ff7b6b">novalidate</tspan> = desactiva validación</text>
  <text x="540" y="303" font-size="11" fill="#e6edf3"><tspan fill="#ff7b6b">autocomplete</tspan> = on | off</text>

  <!-- Validation attrs -->
  <rect x="520" y="355" width="270" height="90" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="655" y="375" font-size="12" fill="#e6edf3" text-anchor="middle" font-weight="bold">Validación nativa HTML5</text>
  <text x="535" y="394" font-size="11" fill="#3fb950">required · minlength · maxlength</text>
  <text x="535" y="411" font-size="11" fill="#3fb950">min · max · pattern · type</text>
  <text x="535" y="428" font-size="10" fill="#8b949e">El navegador valida antes de enviar</text>
</svg>
