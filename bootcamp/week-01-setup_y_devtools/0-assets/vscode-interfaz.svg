  <text x="450" y="310" fill="#8b949e" font-size="10">→ &lt;link rel="stylesheet" href=""/&gt;</text>
  <text x="382" y="328" fill="#c9d1d9" font-size="11">li</text>
  <text x="382" y="344" fill="#c9d1d9" font-size="11">label</text>
  <text x="382" y="360" fill="#c9d1d9" font-size="11">legend</text>
